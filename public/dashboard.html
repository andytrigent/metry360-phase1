        html += '<select class="m-master-search" data-master-section style="min-width:170px;">';
        html += '<option value="">All sections</option>';
        (cfg.maps || []).forEach(function (mp) {
          html += '<option value="' + mp + '"' + (m.section === mp ? " selected" : "") + ">" + esc(SECTION_LABELS[mp] || mp) + "</option>";
        });
        html += "</select>";
      }
      html += '<button class="m-btn m-btn--ghost" data-master-add>+ Add Row</button>';
      html += '<span class="m-master-count" id="masterCount"></span>';
      html += '<span class="m-master-dirty" id="masterDirty"></span>';
      html += '<div style="flex:1"></div>';
      html += '<button class="m-btn m-btn--primary" data-master-save>Save changes</button>';
      html += "</div>";

      html += '<div class="m-master-scroll"><div id="masterBody"></div></div>';
      html += '<div class="m-master-status" id="masterStatus"></div>';

      $content.innerHTML = html;
      if (m.status) document.getElementById("masterStatus").innerHTML = m.status;
      ensureMasterLoaded();
    }

    function setMasterBodyHTML(h) { var b = document.getElementById("masterBody"); if (b) b.innerHTML = h; }

    function ensureMasterLoaded() {
      var m = state.master, tab = m.tab, cfg = masterCfg(tab);
      if (m.loaded[tab]) { renderMasterBody(); return; }
      setMasterBodyHTML(emptyState("Loading " + cfg.label + "…", "Fetching " + cfg.endpoint + "."));
      getJSON(cfg.endpoint)
        .then(function (payload) {
          m.data[tab] = masterParse(cfg, payload);
          m.loaded[tab] = true;
          renderMasterBody();
        })
        .catch(function (e) {
          setMasterBodyHTML(emptyState("Could not load " + cfg.label,
            String((e && e.message) || e) + " — the config endpoint may not be deployed yet."));
        });
    }

    // Rewrites ONLY the grid body (+ counts/dirty) so the search box keeps focus.
    function renderMasterBody() {
      var m = state.master, tab = m.tab, cfg = masterCfg(tab);
      var cols = masterColumns(tab);
      var rows = m.data[tab] || [];
      var body = document.getElementById("masterBody");
      if (!body) return;

      var f = (m.filter || "").trim().toLowerCase();
      var sec = (cfg && cfg.kind === "maps") ? m.section : "";
      var idxs = [];
      rows.forEach(function (r, i) {
        if (sec && r.Map !== sec) return;           // section filter (Org Chart)
        if (!f) { idxs.push(i); return; }
        var hay = cols.map(function (c) { return String(r[c] == null ? "" : r[c]); }).join(" ").toLowerCase();
        if (hay.indexOf(f) >= 0) idxs.push(i);
      });

      if (!cols.length) {
        body.innerHTML = emptyState("Nothing to edit", "This config returned no tabular rows.");
      } else {
        var h = '<table class="m-master-grid"><thead><tr>';
        cols.forEach(function (c) { h += "<th>" + esc(c) + "</th>"; });
        h += "<th></th></tr></thead><tbody>";
        idxs.forEach(function (i) {
          var r = rows[i];
          h += "<tr>";
          cols.forEach(function (c) {
            h += '<td contenteditable="true" data-r="' + i + '" data-c="' + esc(c) + '">' + esc(r[c] == null ? "" : r[c]) + "</td>";
          });
          h += '<td><button class="m-master-del" data-master-del="' + i + '" title="Delete row">✕</button></td>';
          h += "</tr>";
        });
        h += "</tbody></table>";
        body.innerHTML = h;
      }

      var countEl = document.getElementById("masterCount");
      if (countEl) countEl.textContent = idxs.length + " of " + rows.length + " row" + (rows.length === 1 ? "" : "s") + ((f || sec) ? " (filtered)" : "");
      updateMasterDirtyUI();
    }

    function updateMasterDirtyUI() {
      var m = state.master;
      var dirtyEl = document.getElementById("masterDirty");
      if (dirtyEl) dirtyEl.textContent = m.dirty[m.tab] ? "Unsaved changes" : "";
      MASTER_CONFIGS.forEach(function (cfg) {
        var btn = document.querySelector('[data-master-tab="' + cfg.key + '"]');
        if (btn) btn.textContent = cfg.label + (m.dirty[cfg.key] ? " •" : "");
      });
    }

    function masterSetTab(tab) {
      state.master.tab = tab;
      state.master.filter = "";
      state.master.section = "";
      state.master.status = null;
      renderMaster();
    }

    function masterAddRow() {
      var m = state.master, tab = m.tab, cfg = masterCfg(tab), cols = masterColumns(tab);
      var row = {}; cols.forEach(function (c) { row[c] = ""; });
      // For the org-chart maps, default the Map column so the new row saves into a real
      // section — the active section filter if set, otherwise the first map.
      if (cfg && cfg.kind === "maps" && cfg.maps && cfg.maps.length) row.Map = m.section || cfg.maps[0];
      if (!m.data[tab]) m.data[tab] = [];
      m.data[tab].push(row);
      m.dirty[tab] = true;
      // Clear the text filter so the new row is visible (keep the section filter, which
      // the new row matches). Then scroll to it.
      m.filter = "";
      var s = document.querySelector("[data-master-search]"); if (s) s.value = "";
      renderMasterBody();
      var scroll = document.querySelector(".m-master-scroll"); if (scroll) scroll.scrollTop = scroll.scrollHeight;
    }

    function masterDelRow(i) {
      var m = state.master, tab = m.tab;
      if (m.data[tab] && i >= 0 && i < m.data[tab].length) {
        m.data[tab].splice(i, 1);
        m.dirty[tab] = true;
        renderMasterBody();
      }
    }

    function masterStatusHTML(kind, msg) {
      var border = kind === "ok" ? "var(--green)" : "var(--red)";
      var bg = kind === "ok" ? "#E8F5E9" : "#FFEBEE";
      var fg = kind === "ok" ? "#2e7d32" : "#c62828";
      return '<div style="background:' + bg + ';border-left:4px solid ' + border + ';border-radius:6px;padding:12px 16px;color:' + fg + ';font-size:13px;">' + msg + "</div>";
    }
    function setMasterStatus(html) {
      state.master.status = html;
      var el = document.getElementById("masterStatus");
      if (el) el.innerHTML = html || "";
    }

    function masterSave(btn) {
      var m = state.master, tab = m.tab, cfg = masterCfg(tab);
      var rows = m.data[tab] || [];
      var orig = btn.textContent;
      btn.disabled = true; btn.textContent = "Saving…";
      setMasterStatus("");
      fetch(cfg.endpoint, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(masterPutBody(cfg, rows))
      })
        .then(function (r) {
          return r.text().then(function (txt) {
            var j = null; try { j = txt ? JSON.parse(txt) : null; } catch (e) {}
            return { ok: r.ok, status: r.status, j: j };
          });
        })
        .then(function (res) {
          var success = res.ok && (!res.j || res.j.success !== false);
          if (success) {
            m.dirty[tab] = false;
            var n = (res.j && res.j.count != null) ? res.j.count : rows.length;
            setMasterStatus(masterStatusHTML("ok", "Saved " + esc(cfg.label) + " — " + n + " row" + (n === 1 ? "" : "s") + " written."));
            updateMasterDirtyUI();
          } else {
            var msg = (res.j && res.j.error && res.j.error.message) ? res.j.error.message : ("HTTP " + res.status);
            setMasterStatus(masterStatusHTML("err", "Save failed: " + esc(msg) + ". Nothing was changed on the server."));
          }
        })
        .catch(function (e) { setMasterStatus(masterStatusHTML("err", "Save error: " + esc(e.message) + ". Nothing was changed on the server.")); })
        .then(function () { btn.disabled = false; btn.textContent = orig; });
    }

    /* =====================================================================
       MAIN RENDER
       ===================================================================== */
    function render() {
      closeInfo();   // drop any open metric-info popover before the DOM is rebuilt
      renderSidebar();

      // Operational view: report history (no toolbar/band)
      if (state.view === "history") {
        $content.innerHTML = viewHistory();
        wireCharts();
        return;
      }

      // Admin view: editable Master Tables (no toolbar/band)
      if (state.view === "master") {
        renderMaster();
        return;
      }

      var d = activeData();
      var html = renderTopbar();
      html += renderToolbar();

      if (!d) {
        // selected month/week has no report
        var rep = reportById(state.activeReportId);
        var monthLabel = "";
        var months = monthModel();
        months.forEach(function (mo) { if (monthKey(mo.y, mo.m) === state.activeMonthKey) monthLabel = mo.label; });
        html += '<div class="m-card m-section">' +
          emptyState("No report for " + (monthLabel || "this period"),
            "Nothing has been uploaded for the selected month/week. Only weeks with an uploaded report show metrics.") + "</div>";
        $content.innerHTML = html;
        wireCharts();
        return;
      }

      switch (state.view) {
        case "recruitment": html += viewRecruitment(d); break;
        case "management": html += viewExpandableDirectors(d, "Management Scorecard"); break;
        case "director": html += viewExpandableDirectors(d, "Director Drilldown"); break;
        case "productivity": html += viewProductivity(d); break;
        case "coverage-gap": html += viewCoverageGap(d); break;
        case "renege-watch": html += viewRenegeWatch(d); break;
        case "scope": html += viewScope(d); break;
        default: html += viewRecruitment(d);
      }

      $content.innerHTML = html;
      wireCharts();
    }

    /* =====================================================================
       CHART WIRING (donuts / sparklines / line charts)
       ===================================================================== */
    function cssVal(ref) {
      if (!ref) return undefined;
      var m = /^var\((--[a-z0-9-]+)\)$/i.exec(ref.trim());
      if (m) return getComputedStyle(document.documentElement).getPropertyValue(m[1]).trim();
      return ref;
    }
    function wireCharts() {
      if (!window.MetryCharts) return;
      document.querySelectorAll("[data-donut]").forEach(function (node) {
        var pct = Number(node.getAttribute("data-donut"));
        var color = cssVal(node.getAttribute("data-donut-color"));
        // donut() wipes the node's innerHTML, so draw first then re-add the styled center overlay
        MetryCharts.donut(node, pct, color, { size: 150, thickness: 15, showLabel: false });
        var center = document.createElement("div");
        center.className = "m-donut__center";
        center.textContent = pct + "%";
        node.appendChild(center);
      });
      document.querySelectorAll("[data-spark]").forEach(function (node) {
        var raw = node.getAttribute("data-spark");
        var vals = raw ? raw.split(",").map(Number).filter(function (v) { return !isNaN(v); }) : [];
        var color = cssVal(node.getAttribute("data-spark-color"));
        MetryCharts.sparkline(node, vals, color, { width: 90, height: 24 });
      });

      // Velocity line charts fed from the two real weeks.
      var reports = chronoReports().filter(function (r) { return state.dataById[r.report_id]; });
      if (reports.length >= 2) {
        // compact labels (points sit at the chart edges; long labels would clip)
        var labels = reports.map(function (r) { return shortWeek(r.data_week_ending); });
        var joiner = reports.map(function (r) { return num(state.dataById[r.report_id].totals.joiners); });
        var selection = reports.map(function (r) { return num(state.dataById[r.report_id].totals.selections); });
        // marginTop 18 keeps the top y-tick label (e.g. "40") clear of the card edge.
        var defs = {
          joiner: { series: [{ values: joiner, color: cssVal("var(--line-joiner)") }], labels: labels, yTicks: yTicksFor(joiner), marginTop: 18 },
          selection: { series: [{ values: selection, color: cssVal("var(--line-selection)") }], labels: labels, yTicks: yTicksFor(selection), marginTop: 18 }
        };
        document.querySelectorAll("[data-line]").forEach(function (node) {
          var def = defs[node.getAttribute("data-line")];
          if (def) MetryCharts.lineChart(node, def);
        });
      }
    }
    function yTicksFor(vals) {
      var max = Math.max.apply(null, vals.concat([1]));
      var top = Math.ceil(max / 4) * 4 || 4;
      return [0, top / 2, top];
    }

    /* =====================================================================
       EVENTS (delegated)
       ===================================================================== */
    document.addEventListener("click", function (ev) {
      var t = ev.target.closest("[data-nav],[data-scope-view],[data-month],[data-week-report],[data-quarter],[data-tab],[data-rag-toggle],[data-export],[data-reprocess],[data-master-tab],[data-master-add],[data-master-save],[data-master-del],.m-team__chevron");
      if (!t) return;

      // Expand/collapse chevron. Supports nested levels (director → AM → recruiter):
      // opening reveals only direct children; closing collapses the whole subtree
      // and resets nested chevrons so a re-open starts from a clean state.
      if (t.classList.contains("m-team__chevron")) {
        var tr = t.closest("tr");
        var key = tr && tr.getAttribute("data-expand");
        if (key) {
          var nowOpen = t.classList.toggle("is-open");
          if (nowOpen) {
            document.querySelectorAll('[data-child="' + key + '"]').forEach(function (c) { c.classList.remove("is-hidden"); });
          } else {
            collapseSubtree(key);
          }
        }
        return;
      }

      if (t.hasAttribute("data-nav")) {
        var v = t.getAttribute("data-nav");
        if (v === "upload") { window.location.href = "upload.html"; return; }
        state.view = v;
        state.ragOpen = false;
        render();
        return;
      }
      if (t.hasAttribute("data-scope-view")) {
        state.scope = t.getAttribute("data-scope-view");
        state.view = "scope";
        state.ragOpen = false;
        render();
        return;
      }
      if (t.hasAttribute("data-quarter")) {
        selectQuarter(Number(t.getAttribute("data-quarter")));
        return;
      }
      if (t.hasAttribute("data-month")) {
        selectMonth(t.getAttribute("data-month"));
        return;
      }
      if (t.hasAttribute("data-week-report")) {
        // Load the report for the clicked week (weeks[].report_id). Keep the month
        // key aligned to that report's month.
        var rid = t.getAttribute("data-week-report");
        state.activeReportId = rid;
        var wrep = reportById(rid);
        var wpm = wrep ? parseMonthLabel(wrep.month) : null;
        if (wpm) state.activeMonthKey = monthKey(wpm.y, wpm.m);
        render();
        return;
      }
      if (t.hasAttribute("data-tab")) {
        state.tab = t.getAttribute("data-tab");
        render();
        return;
      }
      if (t.hasAttribute("data-rag-toggle")) {
        state.ragOpen = !state.ragOpen;
        render();
        return;
      }
      if (t.hasAttribute("data-export")) {
        if (t.getAttribute("data-export") === "pdf") window.print();
        else exportCSV();
        return;
      }
      if (t.hasAttribute("data-reprocess")) {
        reprocess(t.getAttribute("data-reprocess"), t);
        return;
      }
      if (t.hasAttribute("data-master-tab")) { masterSetTab(t.getAttribute("data-master-tab")); return; }
      if (t.hasAttribute("data-master-add")) { masterAddRow(); return; }
      if (t.hasAttribute("data-master-del")) { masterDelRow(Number(t.getAttribute("data-master-del"))); return; }
      if (t.hasAttribute("data-master-save")) { masterSave(t); return; }
    });

    // Master Tables: inline cell edits + live filter (delegated 'input').
    document.addEventListener("input", function (ev) {
      var el = ev.target;
      if (!el || !el.hasAttribute) return;
      if (el.hasAttribute("data-master-search")) {
        state.master.filter = el.value;
        clearTimeout(masterSearchTimer);
        masterSearchTimer = setTimeout(renderMasterBody, 120);
        return;
      }
      if (el.hasAttribute("data-c") && el.getAttribute("contenteditable") === "true") {
        var m = state.master, tab = m.tab;
        var i = Number(el.getAttribute("data-r")), c = el.getAttribute("data-c");
        if (m.data[tab] && m.data[tab][i]) {
          m.data[tab][i][c] = el.textContent;
          if (!m.dirty[tab]) { m.dirty[tab] = true; updateMasterDirtyUI(); }
        }
        return;
      }
    });

    // Enter commits a Master Tables cell (keeps cells single-line) instead of newline.
    document.addEventListener("keydown", function (ev) {
      var el = ev.target;
      if (ev.key === "Enter" && el && el.hasAttribute && el.hasAttribute("data-c") && el.getAttribute("contenteditable") === "true") {
        ev.preventDefault(); el.blur();
      }
      if (ev.key === "Escape") closeInfo();
    });

    // Metric-info "i" popovers: click toggles (one open at a time); outside click closes.
    document.addEventListener("click", function (ev) {
      var btn = ev.target.closest ? ev.target.closest("[data-info]") : null;
      if (btn) {
        if (state.infoKey === btn.getAttribute("data-info")) closeInfo();
        else openInfo(btn.getAttribute("data-info"), btn);
        return;
      }
      if (ev.target.closest && ev.target.closest(".m-infopop")) return;
      closeInfo();
    });

    document.addEventListener("change", function (ev) {
      if (ev.target && ev.target.hasAttribute && ev.target.hasAttribute("data-scope")) {
        var name = ev.target.value;
        if (name) {
          // Scope to the chosen category/client — same view the sidebar shortcuts open.
          state.scope = name;
          state.view = "scope";
        } else {
          // Placeholder re-selected — drop the scope and return to Recruitment.
          state.scope = "";
          if (state.view === "scope") state.view = "recruitment";
        }
        state.ragOpen = false;
        render();
        return;
      }
      // Org Chart section filter (only re-renders the grid body, keeps the toolbar).
      if (ev.target && ev.target.hasAttribute && ev.target.hasAttribute("data-master-section")) {
        state.master.section = ev.target.value;
        renderMasterBody();
      }
    });

    function selectMonth(key) {
      var mo = monthModel().filter(function (x) { return monthKey(x.y, x.m) === key; })[0];
      state.activeMonthKey = key;
      state.activeReportId = mo ? mo.reportId : null; // null -> empty state
      render();
    }
    function selectQuarter(qn) {
      // pick the first report (chronological) whose month falls in that FY quarter
      var target = null;
      state.reports.forEach(function (r) {
        var mm = parseMonthLabel(r.month);
        if (!mm) return;
        var q = (mm.m >= 4 && mm.m <= 6) ? 1 : (mm.m >= 7 && mm.m <= 9) ? 2 : (mm.m >= 10 && mm.m <= 12) ? 3 : 4;
        if (q === qn && !target) target = { r: r, mm: mm };
      });
      if (target) {
        state.activeReportId = target.r.report_id;
        state.activeMonthKey = monthKey(target.mm.y, target.mm.m);
      } else {
        // quarter has no data — clear active report to show an honest empty state,
        // but keep a month key inside the quarter for the header
        var fyStartMonthByQ = { 1: 4, 2: 7, 3: 10, 4: 1 };
        var rep = reportById(state.activeReportId);
        var mm = rep ? parseMonthLabel(rep.month) : { y: new Date().getFullYear(), m: 7 };
        var y = (qn === 4) ? mm.y + 1 : mm.y; // Jan-Mar belongs to the next calendar year of the FY
        state.activeMonthKey = monthKey(y, fyStartMonthByQ[qn]);
        state.activeReportId = null;
      }
      render();
    }

    function exportCSV() {
      var d = activeData();
      if (!d) { alert("No data loaded for the selected period — nothing to export."); return; }
      var headers = ["Director","Account Manager","Positions","Submissions","Coverage %","Avg Sub","Selections","Reneges","Joiners","Exits"];
      var rows = [];
      (d.directors || []).forEach(function (dir) {
        var dt = dir.totals;
        rows.push([dir.name, "(Director Total)", dt.positions, dt.submissions, dt.coverage_pct + "%", dt.avg_sub, dt.selections, dt.reneges, dt.joiners, dt.exits]);
        (dir.ams || []).forEach(function (am) {
          rows.push([dir.name, am.name, am.positions, am.submissions, am.coverage_pct + "%", am.avg_sub, am.selections, am.reneges, am.joiners, am.exits]);
        });
      });
      var t = d.totals;
      rows.push(["Grand Total", "", t.positions, t.submissions, t.coverage_pct + "%", t.avg_sub, t.selections, t.reneges, t.joiners, t.exits]);
      var csv = headers.join(",") + "\n" + rows.map(function (r) {
        return r.map(function (c) { return '"' + String(c) + '"'; }).join(",");
      }).join("\n");
      var blob = new Blob([csv], { type: "text/csv" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "SOJPE_C2H_WeekEnding_" + String(d.data_week_ending || "unknown").replace(/\s+/g, "") + ".csv";
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(url); document.body.removeChild(a);
    }

    function reprocess(reportId, btn) {
      if (!confirm("Reprocess report " + reportId + "? This re-runs the data pipeline.")) return;
      btn.disabled = true; btn.textContent = "Processing…";
      fetch("/api/reports/" + reportId + "/reprocess", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "reprocess" })
      }).then(function (r) { return r.json(); }).then(function (data) {
        if (data.success) { alert("Report reprocessed."); render(); }
        else { alert("Reprocessing failed: " + ((data.error && data.error.message) || "Unknown error")); btn.disabled = false; btn.textContent = "Reprocess Data"; }
      }).catch(function (e) { alert("Error: " + e.message); btn.disabled = false; btn.textContent = "Reprocess Data"; });
    }

    /* =====================================================================
       BOOT
       ===================================================================== */
    // initial paint (loading) then hydrate
    $content.innerHTML = '<h1 class="m-topbar__title">The Weekly ScoreCard</h1><p class="m-topbar__subtitle">Loading…</p>';
    renderSidebar();
    loadAll().then(render);
  })();
  </script>
</body>
