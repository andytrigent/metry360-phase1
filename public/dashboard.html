<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metry360 — The Weekly ScoreCard</title>
  <link rel="stylesheet" href="./assets/metry-ds.css" />
  <style>
    /* Page-level scaffolding beyond the design system. Kept minimal. */
    html, body { margin: 0; }

    /* RAG rail becomes a positioning context so the popover can overlay the band. */
    .m-rail { position: relative; }
    .m-rail__pop {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 20;
    }

    /* Client-filter note under a client-scoped table. */
    .view-note {
      font-size: 12px;
      color: var(--text-subtle);
      margin: 0 0 0;
      padding: 14px 24px 0;
    }

    /* Recruiter sub-rows (one level below AM in the Recruitment view). Extra
       indent + lighter weight so the recruiter → AM → director nesting reads. */
    .m-table tbody tr.m-subrow--deep .m-team { padding-left: 48px; }
    .m-table tbody tr.m-subrow--deep .m-team__name { font-weight: 400; color: var(--text-body); }
    /* Muted tag for recruiter comments like "New Joiner" / "Saturday Working". */
    .m-tag {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-subtle);
      background: var(--page-bg);
      border: 1px solid var(--card-border);
      border-radius: 5px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Report History cards (operational view, restyled with DS tokens). */
    .rh-list { display: grid; gap: 16px; }
    .rh-card { padding: 20px 22px; }
    .rh-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
    .rh-card__id { font-size: 15px; font-weight: 700; color: var(--text-heading); margin: 0; }
    .rh-card__meta { font-size: 12px; color: var(--text-muted); margin: 4px 0 0; }
    .rh-card__week { font-size: 12px; color: var(--primary); font-weight: 600; margin: 4px 0 0; }
    .rh-badge { font-size: 11px; font-weight: 600; color: #fff; padding: 5px 11px; border-radius: 6px; white-space: nowrap; }
    .rh-files { display: grid; gap: 6px; margin-bottom: 14px; }
    .rh-file {
      font-size: 11px; padding: 6px 10px; background: var(--page-bg);
      border: 1px solid var(--card-border); border-radius: 6px; color: var(--text-body);
      display: flex; justify-content: space-between; gap: 12px;
    }
    .rh-file span { color: var(--text-subtle); }
    .rh-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ---- Master Tables (editable config grids) ---- */
    .m-master-caution {
      background: #FFF8E1; border-left: 4px solid var(--amber);
      color: #8a6d00; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; margin: 4px 0 18px;
    }
    .m-master-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .m-master-search {
      padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 6px;
      font-size: 13px; min-width: 240px; background: var(--card-bg); color: var(--text-body);
    }
    .m-master-count { font-size: 12px; color: var(--text-subtle); }
    .m-master-dirty { font-size: 12px; font-weight: 700; color: var(--amber); }
    .m-master-scroll { max-height: 62vh; overflow: auto; border: 1px solid var(--card-border); border-radius: 8px; }
    .m-master-grid { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .m-master-grid th {
      position: sticky; top: 0; z-index: 1; background: var(--card-bg);
      text-align: left; padding: 9px 10px; border-bottom: 2px solid var(--card-border);
      white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; color: var(--text-subtle);
    }
    .m-master-grid td { padding: 5px 10px; border-bottom: 1px solid var(--card-border); vertical-align: top; color: var(--text-body); }
    .m-master-grid td[contenteditable] { min-width: 90px; outline: none; }
    .m-master-grid td[contenteditable]:focus { background: var(--page-bg); box-shadow: inset 0 0 0 2px var(--primary); }
    .m-master-grid tr:hover td { background: var(--page-bg); }
    .m-master-del { cursor: pointer; color: var(--red); border: none; background: none; font-size: 15px; line-height: 1; padding: 0 4px; }
    .m-master-status { margin-top: 16px; }

    /* ---- "i" info icons + click popover (metric definitions) ---- */
    .m-info {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; margin-left: 5px; padding: 0;
      border-radius: 50%; border: 1px solid var(--chip-border); background: transparent;
      color: var(--text-subtle); font-size: 10px; font-weight: 700; font-style: italic;
      line-height: 1; cursor: pointer; vertical-align: middle;
      font-family: Georgia, "Times New Roman", serif;
    }
    .m-info:hover { color: var(--primary); border-color: var(--primary); }
    .m-infopop {
      position: absolute; z-index: 60; width: 288px; max-width: 86vw;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 10px; box-shadow: var(--shadow-popover); padding: 12px 14px;
    }
    .m-infopop__title { font-size: 12px; font-weight: 700; color: var(--text-heading); margin: 0 0 6px; }
    .m-infopop__body { font-size: 12px; line-height: 1.5; color: var(--text-body); margin: 0; }
    .m-infopop__body strong { color: var(--text-heading); font-weight: 700; }
    /* Header ⓘ sits inline with the uppercase column label. */
    .m-table thead th .m-info { text-transform: none; }

    @media print {
      .m-infopop, .m-info { display: none !important; }
      .m-sidebar, .m-toolbar, .m-rail__pop { display: none !important; }
      .m-shell__content { padding: 0; }
      .m-band { grid-template-columns: 230px 1fr; }
      .m-card { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body class="m-app">
  <div class="m-shell">
    <aside class="m-sidebar" id="sidebar"></aside>
    <main class="m-shell__content" id="content"></main>
  </div>

  <script src="./assets/metry-charts.js"></script>
  <script>
  "use strict";
  (function () {
    /* =====================================================================
       STATE
       ===================================================================== */
    var state = {
      view: "recruitment",       // active nav view
      reports: [],               // /api/reports, chronological ascending
      dataById: {},              // report_id -> dashboard-data payload
      activeReportId: null,      // report feeding the current view
      activeMonthKey: null,      // "2026-7" month currently selected in toolbar
      tab: "health",             // active table filter tab
      ragOpen: false,            // RAG popover expanded?
      infoKey: null,             // open metric-info popover key (one at a time)
      scope: "",                 // selected category (or client fallback) for the scoped view
      loadError: false,
      // Master Tables (editable config grids). data/dirty/loaded keyed by config name.
      master: {
        tab: "customer-master",
        data: { "org-chart": null, "customer-master": null },
        loaded: { "org-chart": false, "customer-master": false },
        dirty: { "org-chart": false, "customer-master": false },
        loading: false,
        filter: "",
        section: "",           // Org Chart section filter (map name) or "" for all
        status: null
      }
    };

    var $content = document.getElementById("content");
    var $sidebar = document.getElementById("sidebar");

    /* =====================================================================
       SMALL UTILITIES
       ===================================================================== */
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }
    function fmtInt(v) { return Math.round(Number(v) || 0).toLocaleString(); }
    function num(v) { var n = Number(v); return isNaN(n) ? 0 : n; }
    function firstWord(s) { return String(s || "").trim().split(/\s+/)[0] || ""; }

    var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    // "10-Jul-2026" -> Date
    function parseWeekEnding(s) {
      var p = String(s || "").split("-");
      if (p.length < 3) return null;
      var mi = MONTHS.indexOf(p[1]);
      if (mi < 0) return null;
      return new Date(Number(p[2]), mi, Number(p[0]));
    }
    // "10-Jul-2026" -> "10-Jul"
    function shortWeek(s) {
      var p = String(s || "").split("-");
      return p.length >= 2 ? parseInt(p[0], 10) + "-" + p[1] : s;
    }
    // "July 2026" -> { y, m(1-12) }
    function parseMonthLabel(s) {
      var p = String(s || "").split(" ");
      if (p.length < 2) return null;
      var names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      var mi = names.indexOf(p[0]);
      if (mi < 0) return null;
      return { y: Number(p[1]), m: mi + 1 };
    }
    function monthKey(y, m) { return y + "-" + m; }
    function pad2(n) { return (n < 10 ? "0" : "") + n; }
    // "2026-07-01" -> Date (local midnight)
    function parseISO(s) {
      var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || "").trim());
      return m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : null;
    }
    // A weeks[] entry's date range -> "01–03 Jul" (same month) / "01 May" (single day)
    // / "28 Jul – 01 Aug" (spans two months). Purely for the chip tooltip.
    function prettyDateRange(startISO, endISO) {
      var s = parseISO(startISO), e = parseISO(endISO);
      if (!s || !e) return String(startISO) + "–" + String(endISO);
      if (s.getMonth() === e.getMonth() && s.getDate() === e.getDate()) return pad2(s.getDate()) + " " + MONTHS[s.getMonth()];
      if (s.getMonth() === e.getMonth()) return pad2(s.getDate()) + "–" + pad2(e.getDate()) + " " + MONTHS[s.getMonth()];
      return pad2(s.getDate()) + " " + MONTHS[s.getMonth()] + " – " + pad2(e.getDate()) + " " + MONTHS[e.getMonth()];
    }
    // Fiscal year label for "Select Cycle": FY starts in April. Jul 2026 -> "26-27".
    function fiscalCycleLabel(y, m) {
      var start = m >= 4 ? y : y - 1;
      return (start % 100) + "-" + ((start + 1) % 100);
    }

    /* =====================================================================
       RAG / HEALTH
       ===================================================================== */
    function ragCoverage(p) { p = num(p); return p >= 80 ? "green" : p >= 70 ? "amber" : "red"; }
    function ragAvgSub(v) { v = num(v); return v >= 4 ? "green" : v >= 3 ? "amber" : "red"; }
    // Honest partial composite: only Coverage vs 80 + Avg Sub vs 4 are computable today.
    function healthComposite(cov, sub) {
      var c = Math.min(num(cov) / 80, 1);
      var s = Math.min(num(sub) / 4, 1);
      return Math.round(((c + s) / 2) * 100);
    }
    function healthBand(h) { return h >= 80 ? "green" : h >= 60 ? "amber" : "red"; }
    function healthTag(band) { return band === "green" ? "H" : band === "amber" ? "W" : "C"; }

    // An entity has coverage metrics only if it actually has Coverage-file positions.
    // Directors that exist only in Staffing/Joiners have positions 0 but real HC/RPR.
    function hasCoverage(e) { return num(e.positions) > 0; }

    /* =====================================================================
       DIRECTOR ROLLUPS
       Names arrive already canonicalized server-side (backend merges duplicate
       directors against the org chart, Hirearchy Tracker.xlsx). The frontend
       renders them as-is — no client-side alias/merge stopgap.
       ===================================================================== */
    // Global RPR = Σ director MTD joiners / Σ director closing HC (totals.rpr is absent).
    function globalRPR(d) {
      var mtd = 0, hc = 0, any = false;
      (d.directors || []).forEach(function (dir) {
        if (dir.hc && dir.hc.closing != null) { hc += num(dir.hc.closing); mtd += num(dir.mtd_joiners); any = true; }
      });
      if (!any || hc <= 0) return null;
      return mtd / hc;
    }

    /* =====================================================================
       DATA ACCESS HELPERS
       ===================================================================== */
    function activeData() { return state.dataById[state.activeReportId] || null; }
    function chronoReports() { return state.reports; } // already sorted ascending
    // All AMs (flattened) for the active report, each tagged with its director.
    function activeAMs() {
      var d = activeData();
      if (!d) return [];
      var out = [];
      (d.directors || []).forEach(function (dir) {
        (dir.ams || []).forEach(function (am) {
          out.push(Object.assign({ director: dir.name }, am));
        });
      });
      return out;
    }

    // Build a 2-point trend series for an entity by matching name across reports.
    // metric = avg_sub. Returns { values:[...], color }.
    function trendSeries(kind, name) {
      var vals = [];
      chronoReports().forEach(function (r) {
        var d = state.dataById[r.report_id];
        if (!d) return;
        var v = null;
        if (kind === "director") {
          (d.directors || []).some(function (dir) {
            if (dir.name === name) { v = num(dir.totals.avg_sub); return true; }
            return false;
          });
        } else {
          (d.directors || []).some(function (dir) {
            return (dir.ams || []).some(function (am) {
              if (am.name === name) { v = num(am.avg_sub); return true; }
              return false;
            });
          });
        }
        if (v != null) vals.push(v);
      });
      var color = "var(--green)";
      if (vals.length >= 2 && vals[vals.length - 1] < vals[0]) color = "var(--red)";
      return { values: vals, color: color };
    }

    /* =====================================================================
       FETCH LAYER
       ===================================================================== */
    function getJSON(url) {
      return fetch(url).then(function (r) {
        if (!r.ok) throw new Error(url + " -> " + r.status);
        return r.json();
      });
    }

    function loadAll() {
      return getJSON("/api/reports")
        .then(function (d) {
          var reports = (d.reports || []).slice();
          // chronological ascending by data week-ending date
          reports.sort(function (a, b) {
            var da = parseWeekEnding(a.data_week_ending), db = parseWeekEnding(b.data_week_ending);
            return (da ? da.getTime() : 0) - (db ? db.getTime() : 0);
          });
          state.reports = reports;
          // fetch dashboard-data for every report (2 today) so trends/velocity are real
          return Promise.all(reports.map(function (r) {
            return getJSON("/api/dashboard-data?report_id=" + encodeURIComponent(r.report_id))
              .then(function (dd) { if (dd && dd.success) state.dataById[r.report_id] = dd; })
              .catch(function () { /* leave absent; UI degrades to empty */ });
          }));
        })
        .then(function () {
          // default active report = latest (last in chrono list)
          var latest = state.reports[state.reports.length - 1];
          if (latest) {
            state.activeReportId = latest.report_id;
            var pm = parseMonthLabel(latest.month);
            if (pm) state.activeMonthKey = monthKey(pm.y, pm.m);
          }
        })
        .catch(function (e) {
          console.warn("Failed to load reports:", e);
          state.loadError = true;
        });
    }

    /* =====================================================================
       TOOLBAR MODEL — months (with gap-fill) + weeks
       ===================================================================== */
    function monthModel() {
      // distinct months from reports
      var byKey = {};
      state.reports.forEach(function (r) {
        var pm = parseMonthLabel(r.month);
        if (!pm) return;
        byKey[monthKey(pm.y, pm.m)] = { y: pm.y, m: pm.m, reportId: r.report_id, label: r.month };
      });
      var keys = Object.keys(byKey);
      if (!keys.length) return [];
      // find min/max to fill the gap (e.g. May..July -> May, June, July)
      var yms = keys.map(function (k) { return byKey[k]; });
      yms.sort(function (a, b) { return (a.y * 12 + a.m) - (b.y * 12 + b.m); });
      var min = yms[0], max = yms[yms.length - 1];
      var out = [];
      var y = min.y, m = min.m;
      var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      while (y < max.y || (y === max.y && m <= max.m)) {
        var k = monthKey(y, m);
        out.push(byKey[k] || { y: y, m: m, reportId: null, label: monthNames[m - 1] + " " + y });
        m++; if (m > 12) { m = 1; y++; }
      }
      return out;
    }

    /* =====================================================================
       SIDEBAR
       ===================================================================== */
    var NAV = [
      { view: "management", label: "Management View" },
      { view: "director", label: "Director Drilldown" },
      { view: "productivity", label: "AM Productivity" },
      { view: "recruitment", label: "Recruitment" }
    ];
    // Metric-driven exception views only. Client shortcuts are rendered separately
    // from the API's clients[] (see renderSidebar) — never hardcoded from the design.
    var VIEWS = [
      { view: "renege-watch", label: "Renege Watch" },
      { view: "coverage-gap", label: "Coverage Gap" }
    ];

    // Primary navigation scope for the dropdown, sidebar shortcuts, and scoped view.
    // Categories (customer master: Sub Unit → Unit → Category) are preferred; clients
    // are the fallback for old payloads that don't carry categories[].
    function scopeModel(d) {
      d = d || activeData();
      if (d && Array.isArray(d.categories) && d.categories.length) {
        return { kind: "category", label: "Category", items: d.categories };
      }
      if (d && Array.isArray(d.clients) && d.clients.length) {
        return { kind: "client", label: "Client", items: d.clients };
      }
      return { kind: "client", label: "Client", items: [] };
    }
    // Top N scope entities by open positions — feeds sidebar shortcuts + mirrors the dropdown.
    function topScopeEntities(n) {
      var items = scopeModel().items.slice();
      items.sort(function (a, b) { return num(b.positions) - num(a.positions); });
      return items.slice(0, n);
    }
    // Unit / sub-unit counts for a category entity (units/sub_units may be counts or arrays).
    function countOf(v) { return Array.isArray(v) ? v.length : num(v); }

    // Active quarter derived from the active report's month (FY quarters: Q1=Apr-Jun...).
    function activeQuarter() {
      var d = activeData();
      var pm = d ? parseMonthLabel(d.data_period ? monthFromPeriod(d) : null) : null;
      // simpler: derive from active report month label
      var rep = reportById(state.activeReportId);
      var mm = rep ? parseMonthLabel(rep.month) : null;
      if (!mm) return 0;
      // FY quarter: Apr-Jun=1, Jul-Sep=2, Oct-Dec=3, Jan-Mar=4
      var m = mm.m;
      if (m >= 4 && m <= 6) return 1;
      if (m >= 7 && m <= 9) return 2;
      if (m >= 10 && m <= 12) return 3;
      return 4;
    }
    function monthFromPeriod() { return null; }
    function reportById(id) {
      for (var i = 0; i < state.reports.length; i++) if (state.reports[i].report_id === id) return state.reports[i];
      return null;
    }

    function renderSidebar() {
      var rep = reportById(state.activeReportId);
      var mm = rep ? parseMonthLabel(rep.month) : null;
      var cycle = mm ? fiscalCycleLabel(mm.y, mm.m) : "";
      var q = activeQuarter();
      var quarters = [
        { n: 1, label: "Q1 (Apr - Jun)" },
        { n: 2, label: "Q2 (Jul - Sep)" },
        { n: 3, label: "Q3 (Oct - Dec)" },
        { n: 4, label: "Q4 (Jan - Mar)" }
      ];

      var html = "";
      html += '<div class="m-sidebar__logo"><div class="m-logo-mark">Q</div><div class="m-logo-word">Metry360</div></div>';
      html += '<nav class="m-nav">';
      NAV.forEach(function (n) {
        html += '<button class="m-nav__item' + (state.view === n.view ? " is-active" : "") +
          '" data-nav="' + n.view + '">' + esc(n.label) + "</button>";
      });
      html += "</nav>";

      html += '<div class="m-sidebar__divider"></div>';
      html += '<div class="m-sidebar__label">Select Cycle ' + esc(cycle) + "</div>";
      html += '<div class="m-cycle">';
      quarters.forEach(function (qq) {
        html += '<button class="m-cycle__item' + (q === qq.n ? " is-active" : "") +
          '" data-quarter="' + qq.n + '">' + esc(qq.label) + "</button>";
      });
      html += "</div>";

      html += '<div class="m-sidebar__divider"></div>';
      html += '<div class="m-sidebar__label">Views</div>';
      html += '<div class="m-views">';
      VIEWS.forEach(function (v) {
        html += '<button class="m-views__item' + (state.view === v.view ? " is-active" : "") +
          '" data-nav="' + v.view + '" style="' + (state.view === v.view ? "color:#fff;font-weight:600;" : "") + '">' +
          esc(v.label) + "</button>";
      });
      // Data-driven shortcuts: top 3 scope entities (categories, or clients on old
      // payloads) by positions. Labels are real names; each opens the scoped view.
      topScopeEntities(3).forEach(function (c) {
        var on = state.view === "scope" && state.scope === c.name;
        html += '<button class="m-views__item' + (on ? " is-active" : "") +
          '" data-scope-view="' + esc(c.name) + '" style="' + (on ? "color:#fff;font-weight:600;" : "") + '">' +
          esc(c.name) + "</button>";
      });
      html += "</div>";

      // Operational links kept discreet at the bottom so no functionality is lost.
      html += '<div class="m-sidebar__divider"></div>';
      html += '<div class="m-sidebar__label">Workspace</div>';
      html += '<div class="m-views">';
      html += '<button class="m-views__item" data-nav="upload">Upload Files</button>';
      html += '<button class="m-views__item' + (state.view === "history" ? " is-active" : "") +
        '" data-nav="history" style="' + (state.view === "history" ? "color:#fff;font-weight:600;" : "") + '">Report History</button>';
      html += '<button class="m-views__item' + (state.view === "master" ? " is-active" : "") +
        '" data-nav="master" style="' + (state.view === "master" ? "color:#fff;font-weight:600;" : "") + '">Master Tables</button>';
      html += "</div>";

      $sidebar.innerHTML = html;
    }

    /* =====================================================================
       TOOLBAR
       ===================================================================== */
    // Calendar weeks for the active month, taken from that month's report payload
    // (weeks[]). Empty when the active month has no uploaded report.
    function activeMonthWeeks() {
      var am = monthModel().filter(function (mo) { return monthKey(mo.y, mo.m) === state.activeMonthKey; })[0];
      if (!am || !am.reportId) return [];
      var dd = state.dataById[am.reportId];
      return (dd && Array.isArray(dd.weeks)) ? dd.weeks : [];
    }

    function renderToolbar() {
      var months = monthModel();
      var d = activeData();
      var scope = scopeModel(d);
      var placeholder = "Select " + scope.label;

      var html = '<div class="m-toolbar">';

      // Scope dropdown — Category when the customer master is available, else Client.
      html += '<div class="m-dropdown">';
      if (scope.items.length) {
        html += '<select class="m-dropdown__select" data-scope>';
        html += '<option value="">' + esc(placeholder) + '</option>';
        scope.items.forEach(function (c) {
          html += '<option value="' + esc(c.name) + '"' + (state.scope === c.name ? " selected" : "") + ">" + esc(c.name) + "</option>";
        });
        html += "</select>";
      } else {
        html += '<select class="m-dropdown__select" disabled title="Category breakdown needs backend deploy"><option>' + esc(placeholder) + '</option></select>';
      }
      html += "</div>";

      // Month chips
      html += '<div class="m-toolbar__group">';
      months.forEach(function (mo) {
        var k = monthKey(mo.y, mo.m);
        var isActive = k === state.activeMonthKey;
        var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        // Active chip shows full "July 2026"; inactive shows just the month name (mirrors the design).
        var label = isActive ? mo.label : monthNames[mo.m - 1];
        html += '<button class="m-chip' + (isActive ? " is-active" : "") + '"' +
          (mo.reportId ? "" : ' title="No report uploaded for this month"') +
          ' data-month="' + k + '">' + esc(label) + "</button>";
      });
      html += "</div>";

      // Week chips for the active month — rendered straight from the API's weeks[]
      // (calendar-anchored: W1 starts on the 1st, weeks end Friday, so W5 can exist).
      // No client-side week math. A chip is clickable only when that week has a
      // report; its report_id drives navigation. Active = the week being viewed.
      html += '<div class="m-toolbar__group">';
      activeMonthWeeks().forEach(function (wk) {
        var isActive = wk.has_report && wk.report_id === state.activeReportId;
        var title = wk.label + " · " + prettyDateRange(wk.start, wk.end) + (wk.has_report ? "" : " · no report");
        html += '<button class="m-chip m-chip--week' + (isActive ? " is-active" : "") + '"' +
          (wk.has_report ? ' data-week-report="' + esc(wk.report_id) + '"' : " disabled") +
          ' title="' + esc(title) + '"' +
          ' style="' + (wk.has_report ? "" : "opacity:.45;") + '">' + esc(wk.label) + "</button>";
      });
      html += "</div>";

      html += '<div class="m-toolbar__spacer"></div>';
      html += '<button class="m-btn m-btn--ghost" data-export="csv" style="margin-right:8px;">CSV</button>';
      html += '<button class="m-btn m-btn--primary" data-export="pdf">Export PDF</button>';
      html += "</div>";
      return html;
    }

    /* =====================================================================
       TOP BAR
       ===================================================================== */
    function renderTopbar() {
      var d = activeData();
      var subtitle = "A director's digest";
      if (d && d.data_period) {
        subtitle += " for " + esc(prettyPeriod(d.data_period));
      } else if (state.activeMonthKey) {
        subtitle += " — no report for the selected period";
      }
      return '<h1 class="m-topbar__title">The Weekly ScoreCard</h1>' +
        '<p class="m-topbar__subtitle">' + subtitle + "</p>";
    }
    // "06-Jul-2026 to 10-Jul-2026" -> "06–10 Jul 2026"
    function prettyPeriod(p) {
      var m = /^(\d{1,2})-([A-Za-z]{3})-(\d{4})\s+to\s+(\d{1,2})-([A-Za-z]{3})-(\d{4})$/.exec(String(p).trim());
      if (!m) return p;
      var d1 = m[1], mo1 = m[2], y1 = m[3], d2 = m[4], mo2 = m[5], y2 = m[6];
      if (mo1 === mo2 && y1 === y2) return d1 + "–" + d2 + " " + mo1 + " " + y1;
      return d1 + " " + mo1 + " – " + d2 + " " + mo2 + " " + y2;
    }

    /* =====================================================================
       KPI BAND (shared across analytics views)
       ===================================================================== */
    function ragIcon(kind) {
      if (kind === "green") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg>';
      if (kind === "amber") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16v.5"/></svg>';
    }

    function effortBrief(d) {
      var t = d.totals;
      var cov = num(t.coverage_pct), sub = num(t.avg_sub);
      // top director by selections
      var top = null;
      (d.directors || []).forEach(function (dir) {
        if (!top || num(dir.totals.selections) > num(top.totals.selections)) top = dir;
      });
      var covRel = cov >= 80 ? "holds above the 80% threshold" : cov >= 70 ? "sits just under the 80% threshold" : "is below the 70% floor";
      var parts = [];
      parts.push("Coverage " + covRel + " at <strong>" + cov + "%</strong>");
      parts.push("average submission is <strong>" + sub + "</strong> against the 4.0 goal");
      var rn = num(t.reneges);
      parts.push("<strong>" + fmtInt(rn) + "</strong> renege" + (rn === 1 ? "" : "s") + " recorded this week");
      var sentence = parts.join(", ") + ".";
      if (top) {
        sentence += " <strong>" + esc(firstWord(top.name)) + "</strong> leads on selections with <strong>" +
          fmtInt(top.totals.selections) + "</strong> this week";
        sentence += (t.recruiters != null) ? ", across <strong>" + fmtInt(t.recruiters) + "</strong> recruiters." : ".";
      }
      return sentence;
    }

    function renderBand(d) {
      var t = d.totals;
      var health = healthComposite(t.coverage_pct, t.avg_sub);
      var covBand = ragCoverage(t.coverage_pct);
      var subBand = ragAvgSub(t.avg_sub);

      var html = '<div class="m-band">';

      // Org health
      html += '<div class="m-card m-card--pad m-orghealth">';
      html += '<div class="m-eyebrow">Organization Health' + infoIcon("orghealth", "Organization Health") + "</div>";
      html += '<div class="m-donut m-orghealth__donut" data-donut="' + health + '" data-donut-color="var(--donut-health)"></div>';
      html += '<div class="m-orghealth__caption">Partial composite: Coverage &amp; Avg Sub only — Selection / Renege / Achievement need target config.</div>';
      html += "</div>";

      // center
      html += '<div class="m-band__center">';
      html += '<div class="m-card m-card--pad"><div class="m-eyebrow">Effort\'s Brief</div><p class="m-brief__body">' + effortBrief(d) + "</p></div>";
      html += '<div class="m-kpis">';

      // KPI 1: Monthly Target — no target config available
      html += '<div class="m-card m-card--pad m-kpi">' +
        '<div class="m-kpi__icon m-kpi__icon--blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg></div>' +
        '<div class="m-kpi__label">Monthly Target' + infoIcon("kpi-target", "Monthly Target") + '</div>' +
        '<div class="m-kpi__value">—<span class="m-kpi__suffix">/ —</span></div>' +
        '<div class="m-kpi__status m-kpi__status--amber">Needs monthly target config</div></div>';

      // KPI 2: Coverage
      html += '<div class="m-card m-card--pad m-kpi">' +
        '<div class="m-kpi__icon m-kpi__icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M4 20c0-3 2-5 5-5s5 2 5 5"/><circle cx="17" cy="9" r="2.4"/><path d="M15 20c0-2.5 1.4-4.2 3.6-4.2"/></svg></div>' +
        '<div class="m-kpi__label">Coverage' + infoIcon("kpi-coverage", "Coverage") + '</div>' +
        '<div class="m-kpi__value">' + num(t.coverage_pct) + '%</div>' +
        '<div class="m-kpi__status m-kpi__status--' + covBand + '">' + coverageStatus(t.coverage_pct) + '</div></div>';

      // KPI 3: Average Submission
      html += '<div class="m-card m-card--pad m-kpi">' +
        '<div class="m-kpi__icon m-kpi__icon--amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 12h5M10 16h5"/></svg></div>' +
        '<div class="m-kpi__label">Average Submission' + infoIcon("kpi-avgsub", "Average Submission") + '</div>' +
        '<div class="m-kpi__value">' + num(t.avg_sub) + '</div>' +
        '<div class="m-kpi__status m-kpi__status--' + subBand + '">' + avgSubStatus(t.avg_sub) + '</div></div>';

      // KPI 4: Renege — show COUNT; % needs Offers
      html += '<div class="m-card m-card--pad m-kpi">' +
        '<div class="m-kpi__icon m-kpi__icon--red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8l6 6 3-3 7 7"/><path d="M15 18h5v-5"/></svg></div>' +
        '<div class="m-kpi__label">Reneges' + infoIcon("kpi-renege", "Reneges") + '</div>' +
        '<div class="m-kpi__value">' + fmtInt(t.reneges) + '</div>' +
        '<div class="m-kpi__status m-kpi__status--amber">Renege % needs Offers data</div></div>';

      html += "</div></div>"; // kpis, center

      // RAG rail (+ optional popover)
      html += renderRail();

      html += "</div>"; // band
      return html;
    }

    function coverageStatus(p) { p = num(p); return p >= 80 ? "Above 80% Threshold" : p >= 70 ? "Warning: Below 80%" : "Critical: Below 70%"; }
    function avgSubStatus(v) { v = num(v); return v >= 4 ? "Above 4.0 Goal" : v >= 3 ? "Warning: Below 4.0 Goal" : "Critical: Below 3.0"; }

    function renderRail() {
      var html = '<div class="m-card m-rail">';
      html += '<button class="m-rail__header" data-rag-toggle>' + (state.ragOpen ? "&rarr;" : "&larr;") + ' RAG</button>';
      html += '<div class="m-rail__legend">';
      html += '<div class="m-rail__entry"><div class="m-ragchip m-ragchip--green">' + ragIcon("green") + '</div><span class="m-rail__entry-label">Healthy</span></div>';
      html += '<div class="m-rail__entry"><div class="m-ragchip m-ragchip--amber">' + ragIcon("amber") + '</div><span class="m-rail__entry-label">Warning</span></div>';
      html += '<div class="m-rail__entry"><div class="m-ragchip m-ragchip--red">' + ragIcon("red") + '</div><span class="m-rail__entry-label">Critical</span></div>';
      html += "</div>";
      if (state.ragOpen) html += renderRagPop();
      html += "</div>";
      return html;
    }

    // Threshold matrix from CLAUDE.md RAG reference.
    function renderRagPop() {
      function cell(label, val) { return '<div><div class="m-ragpop__metric-label">' + label + '</div><div class="m-ragpop__metric-value">' + val + "</div></div>"; }
      var html = '<div class="m-ragpop m-rail__pop">';
      html += '<div class="m-ragpop__header" data-rag-toggle style="cursor:pointer;">&rarr; RAG</div>';
      html += '<div class="m-ragpop__row"><div class="m-ragpop__rowhead"><div class="m-ragchip m-ragchip--green">' + ragIcon("green") + '</div><span class="m-ragpop__rowtitle m-ragpop__rowtitle--green">Healthy</span></div><div class="m-ragpop__grid">' +
        cell("Coverage", "&ge; 80%") + cell("Avg Sub", "&ge; 4") + cell("Selection", "&ge; 75%") + cell("Renege", "&lt; 20%") + "</div></div>";
      html += '<div class="m-ragpop__row"><div class="m-ragpop__rowhead"><div class="m-ragchip m-ragchip--amber">' + ragIcon("amber") + '</div><span class="m-ragpop__rowtitle m-ragpop__rowtitle--amber">Warning</span></div><div class="m-ragpop__grid">' +
        cell("Coverage", "70–80%") + cell("Avg Sub", "3–4") + cell("Selection", "60–75%") + cell("Renege", "20–30%") + "</div></div>";
      html += '<div class="m-ragpop__row"><div class="m-ragpop__rowhead"><div class="m-ragchip m-ragchip--red">' + ragIcon("red") + '</div><span class="m-ragpop__rowtitle m-ragpop__rowtitle--red">Critical</span></div><div class="m-ragpop__grid">' +
        cell("Coverage", "&lt; 70%") + cell("Avg Sub", "&lt; 3") + cell("Selection", "&lt; 60%") + cell("Renege", "&gt; 30%") + "</div></div>";
      html += "</div>";
      return html;
    }

    /* =====================================================================
       TABLE — shared metric cells + tabs
       ===================================================================== */
    /* =====================================================================
       METRIC INFO ("i") POPOVERS — click-only, one open at a time.
       Text is accurate to the real implementation (formulas in this file +
       CLAUDE.md), naming the source file and any availability caveat.
       ===================================================================== */
    var INFO = {
      "col-Team": { t: "Team", b: "The org unit for the row — director, Account Manager, or recruiter. Grouping and rollups follow the org chart (Hirearchy Tracker): director → AM(s) → recruiters." },
      "col-Health": { t: "Health", b: "AM/director level: a partial composite of Coverage vs the 80% target and Avg Sub vs the 4.0 goal (the only inputs computable today), scored 0–100 and tagged H/W/C. Recruiter level: based on Achievement only — min(100, achieve%)." },
      "col-Coverage": { t: "Coverage %", b: "Positions with at least one submission ÷ open positions, from the Ceipal Coverage report. Green ≥80, amber 70–80, red <70. Not available per recruiter — the Coverage report has no recruiter column." },
      "col-Submission": { t: "Average Submission", b: "Total submissions ÷ open positions for the unit (Ceipal Coverage + Submissions reports). Green ≥4, amber 3–4, red <3. At recruiter level this column instead shows that recruiter's raw submission count." },
      "col-Selection": { t: "Selections", b: "Count of weekly client selections (confirmations) from the Ceipal Weekly Selects report. Shown as a count — Select % needs a weekly target, not yet configured. Not tracked per recruiter." },
      "col-Renege": { t: "Reneges", b: "Count of candidates who accepted an offer then dropped, from the Weekly Renege report. Shown as a count — Renege % needs Offers data, which isn't available yet. Not tracked per recruiter." },
      "col-MTD": { t: "Submissions vs Target", b: "Weekly submissions actual vs target (subs_actual / target). Target = sum of recruiter weekly targets from the Avg Subs file, rolled up recruiter → AM → director. Shows “—” when no Avg Subs file was uploaded (e.g. June)." },
      "col-Achieve": { t: "Achievement %", b: "subs_actual ÷ target × 100. Green ≥100, amber 75–99, red <75. Same source and rollup as the Submissions-vs-Target column. Shows “—” with no Avg Subs file." },
      "col-Trend": { t: "Trend", b: "Sparkline of the unit's Average Submission across uploaded weeks. Green if the latest week is at or above the first, red if it declined. Needs ≥2 weeks of data to render." },
      "kpi-target": { t: "Monthly Target", b: "MTD joiners vs the monthly joiner target. Not yet available — the monthly target per AM isn't configured in Phase 1." },
      "kpi-coverage": { t: "Coverage", b: "Portfolio coverage: positions with ≥1 submission ÷ open positions (Ceipal Coverage report). Green ≥80%, amber 70–80%, red <70%." },
      "kpi-avgsub": { t: "Average Submission", b: "Total submissions ÷ open positions across the portfolio (Ceipal Coverage + Submissions reports). Green ≥4, amber 3–4, red <3." },
      "kpi-renege": { t: "Reneges", b: "Total reneges this week (Weekly Renege report). Shown as a count — Renege % needs Offers data, which isn't available yet." },
      "orghealth": { t: "Organization Health", b: "Partial composite of Coverage vs 80% and Avg Sub vs 4.0 — the only metric inputs computable today. Selection / Renege / Achievement are excluded until target and offers config land." }
    };
    function infoIcon(key, label) {
      return '<button type="button" class="m-info" data-info="' + key + '" aria-label="About ' + esc(label) + '">i</button>';
    }
    function closeInfo() {
      var p = document.getElementById("m-infopop");
      if (p) p.remove();
      state.infoKey = null;
    }
    function openInfo(key, anchor) {
      closeInfo();
      var meta = INFO[key];
      if (!meta) return;
      var pop = document.createElement("div");
      pop.className = "m-infopop";
      pop.id = "m-infopop";
      pop.innerHTML = '<p class="m-infopop__title">' + esc(meta.t) + '</p><p class="m-infopop__body">' + meta.b + "</p>";
      document.body.appendChild(pop);
      var r = anchor.getBoundingClientRect();
      var top = r.bottom + window.scrollY + 6;
      var left = r.left + window.scrollX;
      var maxLeft = window.scrollX + document.documentElement.clientWidth - pop.offsetWidth - 12;
      if (left > maxLeft) left = maxLeft;
      if (left < window.scrollX + 8) left = window.scrollX + 8;
      pop.style.top = top + "px";
      pop.style.left = left + "px";
      state.infoKey = key;
    }

    var TABLE_HEADERS = ["Team","Health","Coverage","Submission","Selection","Renege","MTD","Achieve","Trend"];

    // Returns the 8 metric <td>s (everything after the TEAM cell).
    // trend: {kind, name} to build the sparkline, or null.
    function metricCells(e, trend) {
      var cover = hasCoverage(e);
      var dash = '<td class="m-val--muted">—</td>';
      var html = "";
      if (cover) {
        var health = healthComposite(e.coverage_pct, e.avg_sub);
        var hBand = healthBand(health);
        var cov = num(e.coverage_pct), sub = num(e.avg_sub);
        html += '<td class="m-val--' + hBand + '">' + health + '<span class="m-val__tag">' + healthTag(hBand) + "</span></td>";
        html += '<td class="m-val--' + ragCoverage(cov) + '">' + cov + "</td>";
        html += '<td class="m-val--' + ragAvgSub(sub) + '">' + sub + "</td>";
        // Funnel fields are absent on client-level rows — show "—", never a fabricated 0.
        html += (e.selections == null) ? dash : '<td class="m-val--muted">' + fmtInt(e.selections) + "</td>";
        html += (e.reneges == null) ? dash : '<td class="m-val--muted">' + fmtInt(e.reneges) + "</td>";
      } else {
        // Staffing/Joiners-only entity: no Coverage/funnel presence. Show "—" for the
        // metrics it genuinely lacks (health, coverage, submission, selection, renege) —
        // never zeros that read as terrible performance.
        html += dash + dash + dash + dash + dash;
      }
      // MTD column = weekly submissions vs target (subs_actual/target), from the Avg Subs
      // rollup. "—" when there's no Avg Subs file for the week (e.g. June).
      if (e.subs_actual != null && e.target != null) {
        html += '<td class="m-val--muted">' + fmtInt(e.subs_actual) + "/" + fmtInt(e.target) + "</td>";
      } else {
        html += dash;
      }
      // Achieve = achieve_pct, RAG-colored (≥100 green, 75–99 amber, <75 red).
      if (e.achieve_pct != null) {
        var ap = num(e.achieve_pct);
        html += '<td class="m-val--' + ragAchievement(ap) + '">' + Math.round(ap) + "%</td>";
      } else {
        html += dash;
      }
      if (trend && cover) {
        var ts = trendSeries(trend.kind, trend.name);
        html += '<td><span data-spark="' + ts.values.join(",") + '" data-spark-color="' + ts.color + '"></span></td>';
      } else {
        html += dash;
      }
      return html;
    }

    /* =====================================================================
       RECRUITER LEVEL (one below AM)
       Only SUBMISSION (raw per-recruiter count) and ACHIEVE (submissions vs the
       Avg Subs file's per-recruiter target) are real at this level — everything
       else (health/coverage/selection/renege/MTD/trend) genuinely doesn't exist
       per recruiter, so it renders "—". Nulls are never fabricated into zeros.
       ===================================================================== */
    function recruiterAchievement(rec) {
      var t = num(rec.target);
      if (rec.target == null || t <= 0) return null;
      return (num(rec.submissions) / t) * 100;
    }
    // Submission-vs-target achievement RAG (no CLAUDE.md threshold for this one;
    // hit target = green, within 25% = amber, further = red).
    function ragAchievement(pct) { return pct >= 100 ? "green" : pct >= 75 ? "amber" : "red"; }

    function recruiterCells(rec) {
      var dash = '<td class="m-val--muted">—</td>';
      var ach = recruiterAchievement(rec);
      var html = "";
      // Health at recruiter level = Achievement only (min(100, achieve%)), H/W/C tagged.
      // The other health inputs (Coverage/Avg Sub) don't exist per recruiter.
      if (ach == null) {
        html += dash;
      } else {
        var rh = Math.round(Math.min(100, ach));
        var rb = healthBand(rh);
        html += '<td class="m-val--' + rb + '">' + rh + '<span class="m-val__tag">' + healthTag(rb) + "</span></td>";
      }
      html += dash;   // Coverage — no recruiter column in the Coverage report
      html += (rec.submissions == null) ? dash : '<td class="m-val--muted">' + fmtInt(rec.submissions) + "</td>"; // Submission (real)
      html += dash;   // Selection — not per recruiter
      html += dash;   // Renege — not per recruiter
      html += dash;   // MTD — submissions-vs-target rolls up; per-recruiter shown in Submission/Achieve
      html += (ach == null) ? dash : '<td class="m-val--' + ragAchievement(ach) + '">' + Math.round(ach) + "%</td>"; // Achieve (real)
      html += dash;   // Trend
      return html;
    }

    // The Avg Subs file uses "NA"/"-" as filler for an empty comment — treat those
    // as no comment so we don't render a meaningless tag.
    function meaningfulComment(c) {
      if (c == null) return false;
      var s = String(c).trim().toLowerCase();
      return s !== "" && s !== "na" && s !== "n/a" && s !== "-" && s !== "none";
    }
    // Recruiter name + muted comment tag; leave/target (and mgr for unattached) on the sub-line.
    function recruiterTeamCell(rec, showMgr, indentPx) {
      var pad = indentPx ? ' style="padding-left:' + indentPx + 'px"' : "";
      var h = '<div class="m-team"' + pad + '><div class="m-team__names"><span class="m-team__name">' + esc(rec.name);
      if (meaningfulComment(rec.comments)) h += '<span class="m-tag">' + esc(String(rec.comments).trim()) + "</span>";
      h += "</span>";
      var meta = [];
      var lc = num(rec.leave_count);
      if (rec.leave_count != null && lc > 0) meta.push(lc + " day" + (lc === 1 ? "" : "s") + " leave");
      if (rec.target != null) meta.push("target " + fmtInt(rec.target));
      if (showMgr && rec.reporting_manager) meta.push("mgr: " + esc(String(rec.reporting_manager)));
      if (meta.length) h += '<span class="m-team__sub">' + meta.join(" · ") + "</span>";
      h += "</div></div>";
      return h;
    }

    // True if the payload carries recruiter-level detail anywhere (new backend).
    // Old payloads lack it entirely → Recruitment view keeps its flat AM behavior.
    function anyRecruiterDetails(d) {
      if (!d) return false;
      if (Array.isArray(d.unattached_recruiters) && d.unattached_recruiters.length) return true;
      return (d.directors || []).some(function (dir) {
        return (dir.ams || []).some(function (am) { return Array.isArray(am.recruiter_details) && am.recruiter_details.length; });
      });
    }

    /* =====================================================================
       ORG TREE (director → mid-leader AM → AM → recruiter)
       ===================================================================== */
    // Flatten a director's totals + director-level extras into one metric entity,
    // pulling target/subs_actual/achieve_pct from either totals or the director.
    function flattenDir(dir) {
      var flat = Object.assign({ _dir: dir }, dir.totals, { name: dir.name, mtd_joiners: dir.mtd_joiners });
      ["target", "subs_actual", "achieve_pct"].forEach(function (k) { if (flat[k] == null && dir[k] != null) flat[k] = dir[k]; });
      return flat;
    }

    // Build the reports_to forest under a director. An AM whose reports_to is another
    // AM in the same director becomes that AM's child (transitive rollup); everyone
    // else is a root directly under the director. No reports_to (old payload) → all roots (flat).
    function amForest(dir) {
      var ams = (dir.ams || []).slice();
      var names = {}; ams.forEach(function (a) { names[a.name] = true; });
      var children = {}, roots = [];
      ams.forEach(function (a) {
        var mgr = a.reports_to;
        if (mgr && mgr !== a.name && names[mgr]) (children[mgr] = children[mgr] || []).push(a);
        else roots.push(a);
      });
      return { roots: roots, children: children };
    }

    // Render an AM node and its subtree. depth 1 = AM directly under the director.
    // A mid-leader keeps its own metric row and expands to its report AMs and its
    // own recruiters. includeRecruiters is off for Management/Director views.
    function amRows(am, forest, parentKey, depth, includeRecruiters) {
      var kids = sortByTab((forest.children[am.name] || []).slice());
      var recs = (includeRecruiters && Array.isArray(am.recruiter_details)) ? am.recruiter_details : [];
      var expandable = kids.length > 0 || recs.length > 0;
      var akey = parentKey + "-am-" + String(am.name).replace(/\W+/g, "");
      var bits = [];
      if (kids.length) bits.push(kids.length + " report" + (kids.length === 1 ? "" : "s"));
      if (recs.length) bits.push(recs.length + " recruiter" + (recs.length === 1 ? "" : "s"));
      var indent = depth * 20;
      var html = '<tr class="m-subrow is-hidden" data-child="' + parentKey + '"' + (expandable ? ' data-expand="' + akey + '"' : "") + '><td>' +
        teamCell(am.name, bits.join(" · "), expandable, false, indent) + "</td>" +
        metricCells(am, { kind: "am", name: am.name }) + "</tr>";
      kids.forEach(function (child) { html += amRows(child, forest, akey, depth + 1, includeRecruiters); });
      recs.forEach(function (rec) {
        html += '<tr class="m-subrow m-subrow--deep is-hidden" data-child="' + akey + '"><td>' +
          recruiterTeamCell(rec, false, (depth + 1) * 20) + "</td>" + recruiterCells(rec) + "</tr>";
      });
      return html;
    }

    function tableHead(title) {
      var tabs = ["health","coverage","renege","achievement"];
      var labels = { health: "Health", coverage: "Coverage", renege: "Renege", achievement: "Achievement" };
      var h = '<div class="m-tablecard__head"><h2 class="m-card__title">' + esc(title) + '</h2><div class="m-tabs">';
      tabs.forEach(function (t) {
        h += '<button class="m-tab' + (state.tab === t ? " is-active" : "") + '" data-tab="' + t + '">' + labels[t] + "</button>";
      });
      h += "</div></div>";
      return h;
    }

    function tableColHead() {
      var h = "<thead><tr>";
      TABLE_HEADERS.forEach(function (c) { h += "<th>" + esc(c) + infoIcon("col-" + c, c) + "</th>"; });
      h += "</tr></thead>";
      return h;
    }

    // Sort a list of entities per the active tab. Coverage-less entities (HC-only
    // directors) always sink to the bottom — they have no coverage/health to rank.
    function sortByTab(list) {
      var withCov = list.filter(hasCoverage);
      var without = list.filter(function (e) { return !hasCoverage(e); });
      if (state.tab === "coverage") withCov.sort(function (a, b) { return num(b.coverage_pct) - num(a.coverage_pct); });
      else if (state.tab === "renege") withCov.sort(function (a, b) { return num(b.reneges) - num(a.reneges); });
      else if (state.tab === "health") withCov.sort(function (a, b) {
        return healthComposite(b.coverage_pct, b.avg_sub) - healthComposite(a.coverage_pct, a.avg_sub);
      });
      // achievement: no meaningful sort (all —), keep input order
      return withCov.concat(without);
    }

    /* =====================================================================
       VIEW: RECRUITMENT
       Recruiter → AM → Director hierarchy when the payload carries recruiter
       detail; otherwise the original flat AM list (old-payload fallback).
       ===================================================================== */
    function viewRecruitment(d) {
      return anyRecruiterDetails(d) ? viewRecruitmentDeep(d) : viewRecruitmentFlat(d);
    }

    // Old behavior: flat AM rows tagged with their director. Kept intact so an
    // old /api/dashboard-data payload (no recruiter_details) renders as before.
    function viewRecruitmentFlat(d) {
      var ams = sortByTab(activeAMs());
      var body = "";
      ams.forEach(function (am) {
        body += "<tr><td>" + teamCell(am.name, am.director, false, false) + "</td>" +
          metricCells(am, { kind: "am", name: am.name }) + "</tr>";
      });
      if (!ams.length) body = emptyRow();

      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead("Recruitment") +
        '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div></div>";

      html += '<div class="m-panels m-panels--2">';
      html += intelligenceCard(d);
      html += velocityCard("Velocity & Health");
      html += "</div>";
      return html;
    }

    // New behavior: director group (management rollup) → AM rows expand → recruiter
    // sub-rows. Tab sorting applies at both the director and the AM level.
    function viewRecruitmentDeep(d) {
      var dash8 = '<td class="m-val--muted">—</td>';
      var dirs = sortByTab((d.directors || []).map(flattenDir));
      var body = "";
      dirs.forEach(function (row) {
        var dir = row._dir;
        var dkey = "d-" + dir.name.replace(/\W+/g, "");
        var forest = amForest(dir);
        var coverLess = !hasCoverage(dir.totals);
        // Group row shows just the leader's name (no "Team" prefix); HC-only note kept.
        var sub = coverLess
          ? (dir.hc && dir.hc.closing != null ? "HC only (" + fmtInt(dir.hc.closing) + " deployed)" : "Staffing only")
          : "";
        body += '<tr data-expand="' + dkey + '"><td>' + teamCell(dir.name, sub, forest.roots.length > 0, false) + "</td>" +
          metricCells(row, { kind: "director", name: dir.name }) + "</tr>";
        forest.roots.forEach(function (am) { body += amRows(am, forest, dkey, 1, true); });
      });

      // Recruiters whose AM didn't resolve — grouped at the bottom, honest label.
      var un = Array.isArray(d.unattached_recruiters) ? d.unattached_recruiters : [];
      if (un.length) {
        var ukey = "unassigned-recruiters";
        body += '<tr data-expand="' + ukey + '"><td>' +
          teamCell("Unassigned recruiters", un.length + " recruiter" + (un.length === 1 ? "" : "s") + " · AM unresolved", true, false) + "</td>" +
          dash8 + dash8 + dash8 + dash8 + dash8 + dash8 + dash8 + dash8 + "</tr>";
        un.forEach(function (rec) {
          body += '<tr class="m-subrow m-subrow--deep is-hidden" data-child="' + ukey + '"><td>' +
            recruiterTeamCell(rec, true, 20) + "</td>" + recruiterCells(rec) + "</tr>";
        });
      }

      if (!dirs.length && !un.length) body = emptyRow();

      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead("Recruitment") +
        '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div></div>";
      html += '<div class="m-panels m-panels--2">' + intelligenceCard(d) + velocityCard("Velocity & Health") + "</div>";
      return html;
    }

    /* =====================================================================
       VIEW: MANAGEMENT / DIRECTOR (expandable director rows)
       ===================================================================== */
    function viewExpandableDirectors(d, title) {
      var dirs = sortByTab((d.directors || []).map(flattenDir));
      var body = "";
      dirs.forEach(function (row) {
        var dir = row._dir;
        var key = "d-" + dir.name.replace(/\W+/g, "");
        var forest = amForest(dir);
        var coverLess = !hasCoverage(dir.totals);
        // Group row shows just the leader's name (no "Team" prefix); HC-only note kept.
        var sub = coverLess
          ? (dir.hc && dir.hc.closing != null ? "HC only (" + fmtInt(dir.hc.closing) + " deployed)" : "Staffing only")
          : "";
        body += '<tr data-expand="' + key + '"><td>' + teamCell(dir.name, sub, forest.roots.length > 0, false) + "</td>" +
          metricCells(row, { kind: "director", name: dir.name }) + "</tr>";
        // director → mid-leader → AM nesting (2 levels collapse to flat when no reports_to).
        forest.roots.forEach(function (am) { body += amRows(am, forest, key, 1, false); });
      });
      if (!dirs.length) body = emptyRow();

      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead(title) +
        '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div></div>";
      html += '<div class="m-panels m-panels--3">' + intelligenceCard(d) + focusCard(d) + velocityCard("Velocity Trend") + "</div>";
      return html;
    }

    /* =====================================================================
       VIEW: AM PRODUCTIVITY (flat, ranked)
       ===================================================================== */
    function viewProductivity(d) {
      var ams = activeAMs().slice();
      // default rank by submissions; tab overrides
      if (state.tab === "health") ams = sortByTab(ams);
      else if (state.tab === "coverage" || state.tab === "renege") ams = sortByTab(ams);
      else ams.sort(function (a, b) { return num(b.submissions) - num(a.submissions); });

      var body = "";
      ams.forEach(function (am) {
        body += "<tr><td>" + teamCell(am.name, am.director, false, false) + "</td>" +
          metricCells(am, { kind: "am", name: am.name }) + "</tr>";
      });
      if (!ams.length) body = emptyRow();

      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead("AM Productivity") +
        '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div></div>";
      html += '<div class="m-panels m-panels--3">' + intelligenceCard(d) + focusCard(d) + velocityCard("Velocity Trend") + "</div>";
      return html;
    }

    /* =====================================================================
       VIEW: CLIENT / EXCEPTION VIEWS
       ===================================================================== */
    function viewCoverageGap(d) {
      // Fully derivable now: AMs under 70% coverage, worst first.
      var ams = activeAMs().filter(function (am) { return num(am.coverage_pct) < 70; })
        .sort(function (a, b) { return num(a.coverage_pct) - num(b.coverage_pct); });
      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead("Coverage Gap");
      if (ams.length) {
        var body = "";
        ams.forEach(function (am) {
          body += "<tr><td>" + teamCell(am.name, am.director, false, false) + "</td>" +
            metricCells(am, { kind: "am", name: am.name }) + "</tr>";
        });
        html += '<p class="view-note">Account Managers below the 70% coverage floor, worst first (' + ams.length + ").</p>";
        html += '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div>";
      } else {
        html += emptyState("No coverage gaps", "Every Account Manager is at or above 70% coverage for this week.");
      }
      html += "</div>";
      html += '<div class="m-panels m-panels--2">' + intelligenceCard(d) + velocityCard("Velocity & Health") + "</div>";
      return html;
    }

    function viewRenegeWatch(d) {
      var ams = activeAMs().filter(function (am) { return num(am.reneges) > 0; })
        .sort(function (a, b) { return num(b.reneges) - num(a.reneges); });
      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead("Renege Watch");
      if (ams.length) {
        var body = "";
        ams.forEach(function (am) {
          body += "<tr><td>" + teamCell(am.name, am.director, false, false) + "</td>" +
            metricCells(am, { kind: "am", name: am.name }) + "</tr>";
        });
        html += '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div>";
      } else {
        html += emptyState("No reneges recorded", "No AM shows a renege for this week. Note: renege parsing is being corrected in the backend — counts may read as zero until that deploys.");
      }
      html += "</div>";
      return html;
    }

    // Scope-scoped view: a single category (or client fallback) selected via the
    // sidebar shortcut or the dropdown. Everything renders from the API.
    function viewScope(d) {
      var scope = scopeModel(d);
      var kind = scope.label; // "Category" or "Client"
      var title = state.scope || kind;
      var html = renderBand(d);
      html += '<div class="m-card m-tablecard m-section">' + tableHead(title);
      if (!scope.items.length) {
        html += emptyState("No " + kind.toLowerCase() + " breakdown", "This week's data has no per-" + kind.toLowerCase() + " aggregation.");
      } else if (!state.scope) {
        html += emptyState("Select a " + kind.toLowerCase(), "Choose a " + kind.toLowerCase() + " from the sidebar or the Select " + kind + " dropdown to scope this view.");
      } else {
        var c = scope.items.filter(function (x) { return x.name === state.scope; })[0];
        if (!c) {
          html += emptyState(kind + " not in this week", "“" + esc(state.scope) + "” has no positions in this week's data.");
        } else {
          var note = "Coverage view for " + esc(c.name) + " — " + fmtInt(c.positions) +
            " open position" + (num(c.positions) === 1 ? "" : "s") + " this week";
          // Category rows carry unit / sub-unit rollup counts from the customer master.
          if (scope.kind === "category" && (c.units != null || c.sub_units != null)) {
            note += " · " + countOf(c.units) + " unit" + (countOf(c.units) === 1 ? "" : "s") +
              ", " + countOf(c.sub_units) + " sub-unit" + (countOf(c.sub_units) === 1 ? "" : "s");
          }
          html += '<p class="view-note">' + note + ".</p>";
          var body = "<tr><td>" + teamCell(c.name, "", false, false) + "</td>" + metricCells(c, null) + "</tr>";
          html += '<div class="m-table-scroll"><table class="m-table">' + tableColHead() + "<tbody>" + body + "</tbody></table></div>";
        }
      }
      html += "</div>";
      html += '<div class="m-panels m-panels--2">' + intelligenceCard(d) + velocityCard("Velocity & Health") + "</div>";
      return html;
    }

    /* =====================================================================
       SHARED CARDS: Intelligence, Focus, Velocity
       ===================================================================== */
    function intelligenceCard(d) {
      var alerts = buildAlerts(d).slice(0, 4);
      var html = '<div class="m-card m-card--pad"><h2 class="m-card__title">Intelligence Report</h2><div class="m-alerts">';
      alerts.forEach(function (a) {
        html += '<div class="m-alert m-alert--' + a.type + '"><div class="m-alert__kicker">' + a.kicker + '</div><p class="m-alert__body">' + a.body + "</p></div>";
      });
      if (!alerts.length) html += '<p class="m-brief__body">No threshold breaches to report for this week.</p>';
      html += "</div></div>";
      return html;
    }

    // Alerts derived strictly from computable metrics (Coverage %, Avg Sub, positions).
    function buildAlerts(d) {
      var t = d.totals, out = [];
      var dirs = (d.directors || []);

      // WIN: best director beating coverage 80% or avg sub 4
      var bestCov = null, bestSub = null;
      dirs.forEach(function (dir) {
        if (num(dir.totals.coverage_pct) >= 80 && (!bestCov || num(dir.totals.coverage_pct) > num(bestCov.totals.coverage_pct))) bestCov = dir;
        if (num(dir.totals.avg_sub) >= 4 && (!bestSub || num(dir.totals.avg_sub) > num(bestSub.totals.avg_sub))) bestSub = dir;
      });
      if (bestCov) out.push({ type: "win", kicker: "Strategic Win", body: "<strong>" + esc(firstWord(bestCov.name)) + " coverage:</strong> " + num(bestCov.totals.coverage_pct) + "% — clearing the 80% target." });
      else if (bestSub) out.push({ type: "win", kicker: "Strategic Win", body: "<strong>" + esc(firstWord(bestSub.name)) + " submissions:</strong> avg " + num(bestSub.totals.avg_sub) + " — above the 4.0 goal." });

      // RISK: amber-zone overall avg sub
      if (num(t.avg_sub) >= 3 && num(t.avg_sub) < 4) {
        out.push({ type: "risk", kicker: "Operational Risk", body: "<strong>Pipeline health:</strong> average submission is " + num(t.avg_sub) + ", under the 4.0 goal across " + fmtInt(t.positions) + " open positions." });
      } else if (num(t.coverage_pct) >= 70 && num(t.coverage_pct) < 80) {
        out.push({ type: "risk", kicker: "Operational Risk", body: "<strong>Coverage watch:</strong> overall coverage is " + num(t.coverage_pct) + "%, in the amber 70–80% band." });
      }

      // BLOCKER: overall coverage red
      if (num(t.coverage_pct) < 70) {
        out.push({ type: "blocker", kicker: "Critical Blocker", body: "<strong>Coverage crisis:</strong> overall coverage is " + num(t.coverage_pct) + "% against a 70% floor, across " + fmtInt(t.positions) + " positions." });
      }
      // BLOCKER: global RPR below 1.0 (MTD joiners per deployed HC, summed over directors that have HC)
      var grpr = globalRPR(d);
      if (grpr != null && grpr < 1.0) {
        out.push({ type: "blocker", kicker: "Critical Blocker", body: "<strong>Efficiency crisis:</strong> global RPR is " + grpr.toFixed(2) + " (MTD joiners per deployed head count) — far below the 1.0 target." });
      }
      // BLOCKER: an AM with a large position bucket and low coverage (e.g. unassigned/spread-thin)
      var worst = null;
      activeAMs().forEach(function (am) {
        if (num(am.positions) >= 100 && num(am.coverage_pct) < 40) {
          if (!worst || num(am.positions) > num(worst.positions)) worst = am;
        }
      });
      if (worst) out.push({ type: "blocker", kicker: "Critical Blocker", body: "<strong>" + esc(worst.name) + ":</strong> " + fmtInt(worst.positions) + " positions at only " + num(worst.coverage_pct) + "% coverage — a concentrated gap." });

      return out;
    }

    function focusCard(d) {
      // Focus on the top director by selections (real, weekly).
      var dir = null;
      (d.directors || []).forEach(function (x) { if (!dir || num(x.totals.selections) > num(dir.totals.selections)) dir = x; });
      if (!dir) return '<div class="m-card m-card--pad m-focus"><h3 class="m-focus__title">Focus</h3><p class="m-brief__body">No director data.</p></div>';
      var dt = dir.totals;
      var health = healthComposite(dt.coverage_pct, dt.avg_sub);
      var rpr = dir.rpr;
      var rprCell = (rpr == null) ? '<span class="m-minikpi__value m-minikpi__value--muted">—</span>'
        : '<span class="m-minikpi__value m-minikpi__value--' + (num(rpr) >= 1 ? "green" : "red") + '">' + num(rpr).toFixed(2) + "</span>";
      var recCell = (dir.recruiters == null) ? '<span class="m-minikpi__value m-minikpi__value--muted">—</span>'
        : '<span class="m-minikpi__value">' + fmtInt(dir.recruiters) + "</span>";
      var mtdCell = (dir.mtd_joiners == null) ? '<span class="m-minikpi__value m-minikpi__value--muted">—</span>'
        : '<span class="m-minikpi__value m-minikpi__value--green">' + fmtInt(dir.mtd_joiners) + '<span class="m-minikpi__suffix">/—</span></span>';
      var html = '<div class="m-card m-card--pad m-focus">';
      html += '<h3 class="m-focus__title">Focus · ' + esc(dir.name) + "</h3>";
      html += '<div class="m-donut m-focus__donut" data-donut="' + health + '" data-donut-color="var(--donut-focus)"></div>';
      html += '<div class="m-focus__grid">';
      html += '<div class="m-minikpi"><span class="m-minikpi__label">MTD Joiners</span>' + mtdCell + "</div>";
      html += '<div class="m-minikpi"><span class="m-minikpi__label">RPR</span>' + rprCell + "</div>";
      html += '<div class="m-minikpi"><span class="m-minikpi__label">Coverage</span><span class="m-minikpi__value m-minikpi__value--' + ragCoverage(dt.coverage_pct) + '">' + num(dt.coverage_pct) + '%</span></div>';
      html += '<div class="m-minikpi"><span class="m-minikpi__label">Recruiters</span>' + recCell + "</div>";
      html += "</div></div>";
      return html;
    }

    function velocityCard(title) {
      var reports = chronoReports().filter(function (r) { return state.dataById[r.report_id]; });
      var html = '<div class="m-card m-card--pad"><h2 class="m-card__title">' + esc(title) + '</h2>';
      if (reports.length < 2) {
        html += '<div class="m-charts">' + emptyState("Trend needs ≥ 2 uploaded weeks", "Only " + reports.length + " week of data is available. Velocity charts appear once a second week is uploaded.") + "</div>";
        html += "</div>";
        return html;
      }
      html += '<div class="m-charts">';
      html += '<div class="m-chart"><h3 class="m-chart__title">Joiner Velocity Trend</h3><div class="m-chart__canvas" data-line="joiner"></div></div>';
      html += '<div class="m-chart"><h3 class="m-chart__title">Selection Velocity Trend</h3><div class="m-chart__canvas" data-line="selection"></div></div>';
      html += "</div></div>";
      return html;
    }

    /* =====================================================================
       TEAM CELL + EMPTY HELPERS
       ===================================================================== */
    function teamCell(name, sub, expandable, open, indentPx) {
      var pad = indentPx ? ' style="padding-left:' + indentPx + 'px"' : "";
      var h = '<div class="m-team"' + pad + ">";
      if (expandable) h += '<span class="m-team__chevron' + (open ? "" : "") + '" role="button" aria-label="Expand">›</span>';
      h += '<div class="m-team__names"><span class="m-team__name">' + esc(name) + "</span>";
      if (sub) h += '<span class="m-team__sub">' + esc(sub) + "</span>";
      h += "</div></div>";
      return h;
    }
    // Hide a row's entire subtree: direct children plus, recursively, any
    // grandchildren, resetting nested chevrons. Used when collapsing a level.
    function collapseSubtree(key) {
      document.querySelectorAll('[data-child="' + key + '"]').forEach(function (c) {
        c.classList.add("is-hidden");
        var childKey = c.getAttribute("data-expand");
        if (childKey) {
          var chev = c.querySelector(".m-team__chevron");
          if (chev) chev.classList.remove("is-open");
          collapseSubtree(childKey);
        }
      });
    }
    function emptyRow() {
      return '<tr><td colspan="' + TABLE_HEADERS.length + '" style="padding:0;">' +
        emptyState("No data", "No rows for this selection.") + "</td></tr>";
    }
    function emptyState(title, text) {
      return '<div class="m-empty"><div class="m-empty__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v16"/></svg></div>' +
        '<p class="m-empty__title">' + esc(title) + '</p><p class="m-empty__text">' + esc(text) + "</p></div>";
    }

    /* =====================================================================
       REPORT HISTORY (operational, restyled)
       ===================================================================== */
    var STATUS_BG = { DRAFT: "#FFB74D", IN_REVIEW: "#42A5F5", PROCESSING: "#42A5F5", APPROVED: "#4CAF50" };
    function statusColor(s) { return STATUS_BG[s] || "#999"; }
    function fmtSize(b) {
      var n = Number(b) || 0;
      if (n >= 1048576) return (n / 1048576).toFixed(1) + " MB";
      if (n >= 1024) return Math.round(n / 1024) + " KB";
      return n + " B";
    }
    function viewHistory() {
      var html = '<h1 class="m-topbar__title">Report History</h1>';
      html += '<p class="m-topbar__subtitle">Draft → Review → Approve &amp; Publish. Files download only after approval.</p>';
      html += '<div class="m-section rh-list">';
      if (state.loadError) {
        html += '<div class="m-card">' + emptyState("Could not load reports", "The reports API was unreachable. Check the connection and reload.") + "</div>";
      } else if (!state.reports.length) {
        html += '<div class="m-card">' + emptyState("No reports yet", "Upload the 7 weekly raw files to create the first report for review.") + "</div>";
      } else {
        // newest first for history
        var reps = state.reports.slice().reverse();
        reps.forEach(function (r) {
          var color = statusColor(r.status);
          html += '<div class="m-card rh-card">';
          html += '<div class="rh-card__top"><div>';
          html += '<p class="rh-card__id">' + esc(r.report_id) + "</p>";
          if (r.data_week_ending) html += '<p class="rh-card__week">Data week ending ' + esc(r.data_week_ending) + (r.data_period ? " (" + esc(r.data_period) + ")" : "") + "</p>";
          html += '<p class="rh-card__meta">Uploaded ' + esc(fmtUploaded(r.created_at)) + "</p>";
          html += '</div><span class="rh-badge" style="background:' + color + '">' + esc(String(r.status || "").replace("_", " ")) + "</span></div>";
          if (Array.isArray(r.files) && r.files.length) {
            html += '<div class="rh-files">';
            r.files.forEach(function (f) { html += '<div class="rh-file">' + esc(f.name) + "<span>" + fmtSize(f.size) + "</span></div>"; });
            html += "</div>";
          }
          html += '<div class="rh-actions">';
          if (r.status !== "APPROVED") html += '<button class="m-btn m-btn--ghost" data-reprocess="' + esc(r.report_id) + '">Reprocess Data</button>';
          if (r.status === "APPROVED") html += '<button class="m-btn m-btn--primary">Download Files (' + (r.file_count || 0) + ")</button>";
          else html += '<button class="m-btn m-btn--ghost" disabled style="opacity:.5;cursor:not-allowed;">Download (locked until approved)</button>';
          html += "</div></div>";
        });
      }
      html += "</div>";
      return html;
    }
    function fmtUploaded(s) {
      try {
        var iso = String(s).endsWith("Z") ? s : s + "Z";
        return new Date(iso).toLocaleString();
      } catch (e) { return s; }
    }

    /* =====================================================================
       MASTER TABLES — editable config grids (Org Chart + Project Mapping)
       Plain-JS editable table: inline cell edit, add/delete row, text filter,
       unsaved-changes indicator, Save (PUT the full array). Honest status only.
       ===================================================================== */
    // Two config shapes: customer-master is an array of row objects ("rows"); org-chart
    // is three name→canonical maps ("maps"), which we flatten to Map/Key/Value rows for
    // editing and rebuild into the 3-dict object on save.
    var MASTER_CONFIGS = [
      { key: "org-chart",       endpoint: "/api/config/org-chart",       label: "Org Chart",       kind: "maps", maps: ["canonical_org", "am_aliases", "director_aliases", "recruiter_org"] },
      { key: "customer-master", endpoint: "/api/config/customer-master", label: "Project Mapping", kind: "rows" }
    ];
    // Fallback columns for the customer master when the array is empty, so Add Row
    // still produces a usable row. Real columns are derived from the data when present.
    var CUSTOMER_MASTER_COLUMNS = ["Unit","Sub Unit","HRPOC ID","HRPOC Name","Billing Approver ID","Billing Approver Name","Account Manager ID","Account Manager Name","Sr. Director ID","Sr. Director Name","Director ID","Director Name","Category"];
    var masterSearchTimer = null;

    function masterCfg(tab) { return MASTER_CONFIGS.filter(function (c) { return c.key === tab; })[0]; }

    // Turn a config GET payload into editable rows (per config kind).
    function masterParse(cfg, payload) {
      if (cfg.kind === "maps") {
        var rows = [];
        (cfg.maps || []).forEach(function (mapName) {
          var obj = (payload && payload[mapName]) || {};
          Object.keys(obj).forEach(function (k) { rows.push({ Map: mapName, Key: k, Value: obj[k] }); });
        });
        return rows;
      }
      // rows kind: pull the array out of whatever envelope was returned.
      if (Array.isArray(payload)) return payload.slice();
      if (payload && Array.isArray(payload.rows)) return payload.rows.slice();
      if (payload && Array.isArray(payload.data)) return payload.data.slice();
      if (payload && typeof payload === "object") {
        for (var k in payload) { if (Array.isArray(payload[k])) return payload[k].slice(); }
      }
      return [];
    }

    // Reconstruct the PUT body for a config (per kind).
    function masterPutBody(cfg, rows) {
      if (cfg.kind === "maps") {
        var out = {}; (cfg.maps || []).forEach(function (m) { out[m] = {}; });
        rows.forEach(function (r) {
          var mp = r.Map, k = r.Key;
          if (mp && String(mp).trim() && k != null && String(k).trim()) {
            if (!out[mp]) out[mp] = {};
            out[mp][String(k)] = r.Value;
          }
        });
        return out;
      }
      return rows; // rows kind: PUT the array
    }

    // Column order = first-seen union of keys across rows (backend's own order).
    function masterColumns(tab) {
      var cfg = masterCfg(tab);
      var rows = state.master.data[tab] || [];
      var seen = {}, cols = [];
      rows.forEach(function (r) {
        if (r && typeof r === "object") Object.keys(r).forEach(function (k) { if (!seen[k]) { seen[k] = 1; cols.push(k); } });
      });
      if (!cols.length && cfg && cfg.kind === "maps") return ["Map", "Key", "Value"];
      if (!cols.length && tab === "customer-master") return CUSTOMER_MASTER_COLUMNS.slice();
      return cols;
    }

    // Friendly labels for the org-chart map sections.
    var SECTION_LABELS = { canonical_org: "Canonical org", am_aliases: "AM aliases", director_aliases: "Director aliases", recruiter_org: "Recruiter → AM" };
    var MASTER_SUBTITLES = {
      "org-chart": "Org chart & mappings — canonical names, AM/director aliases, and recruiter → AM. Fix a mapping (e.g. an unattached recruiter) here directly; changes take effect on the next data load.",
      "customer-master": "Project (customer) mapping — Sub Unit → Unit → Category and the manager chain. Edits take effect on the next data load."
    };

    function renderMaster() {
      var m = state.master, cfg = masterCfg(m.tab);
      var html = '<h1 class="m-topbar__title">Master Tables</h1>';
      html += '<p class="m-topbar__subtitle">' + esc(MASTER_SUBTITLES[m.tab] || "") + "</p>";
      html += '<div class="m-master-caution">Edits take effect on next data load. No sign-in protection yet (Phase 1).</div>';

      html += '<div class="m-tabs" style="margin-bottom:16px;">';
      MASTER_CONFIGS.forEach(function (cfg) {
        html += '<button class="m-tab' + (m.tab === cfg.key ? " is-active" : "") + '" data-master-tab="' + cfg.key + '">' +
          esc(cfg.label) + (m.dirty[cfg.key] ? " •" : "") + "</button>";
      });
      html += "</div>";

      html += '<div class="m-master-toolbar">';
      html += '<input class="m-master-search" data-master-search placeholder="Filter rows…" value="' + esc(m.filter) + '" />';
      // Org Chart section filter (maps config only) — lets ops jump to a mapping group.
      if (cfg && cfg.kind === "maps") {
